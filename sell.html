<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.1//EN" "http://www.w3.org/TR/xhtml11/DTD/xhtml11.dtd">
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Auto Trade - Sell Your Car</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" type="text/css" href="css/style.css" />
</head>
<body>
    <a href="index.html" class="btn btn-secondary">
        &laquo; Return to Home
    </a>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h2 class="mb-4">List Your Vehicle for Sale</h2>
            <form action="process-sell.html" method="get" class="p-4 border rounded bg-white shadow-sm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label for="carMake" class="form-label">Car Make/Model</label>
                        <input type="text" id="carMake" name="carMake" class="form-control" required="required" />
                    </div>
                    <div class="col-md-6 mb-3">
                        <label for="vin" class="form-label">Chassis Number (VIN)</label>
                        <input type="text" id="vin" name="vin" class="form-control" />
                    </div>
                </div>
                
                <div class="mb-3">
                    <label class="form-label d-block">Vehicle Condition:</label>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" id="excellent" name="condition" value="excellent" />
                        <label class="form-check-label" for="excellent">Excellent</label>
                    </div>
                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" id="good" name="condition" value="good" />
                        <label class="form-check-label" for="good">Good</label>
                    </div>
                </div>

                <div class="mb-4">
                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" id="accident" name="accident" value="yes" /> 
                        <label class="form-check-label" for="accident">I certify that the information provided is accurate.</label>
                    </div>
                </div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-success btn-lg">Submit Listing and Return Home</button>
                </div>
            </form>
        </div>
    </div>
</div>

</body>
</html>
